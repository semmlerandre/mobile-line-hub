version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:80"
    restart: unless-stopped
    container_name: controle-linhas-app

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: controle-linhas-db
    environment:
      POSTGRES_DB: ${DB_NAME:-controle_linhas}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senha_segura}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
